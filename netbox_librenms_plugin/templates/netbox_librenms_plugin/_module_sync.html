{% load helpers %}

<!-- Module Replace / Move Modal -->
<div class="modal fade" id="moduleReplaceModal" tabindex="-1"
     aria-labelledby="moduleReplaceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="moduleReplaceModalLabel">
                    <i class="mdi mdi-swap-horizontal me-1"></i>Module Mismatch
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="moduleReplaceModalBody">
                <div class="text-center py-3">
                    <i class="mdi mdi-loading mdi-spin mdi-36px"></i>
                    <p class="mt-2">Loading…</p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Action Buttons -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Module Sync</h2>
    <div class="btn-list">
        <form method="post">
            {% csrf_token %}
            {% if has_librenms_id %}
                {% with model_name=object|meta:"model_name" %}
                    {% if model_name == "device" %}
                        <button hx-post="{% url 'plugins:netbox_librenms_plugin:device_module_sync' pk=object.pk %}"
                                hx-target="#module-sync-content"
                                class="btn btn-outline-primary">
                            Refresh Modules
                        </button>
                    {% endif %}
                {% endwith %}
            {% endif %}
        </form>
    </div>
</div>

<!-- Container for the module sync content -->
<div id="module-sync-content">
    {% include 'netbox_librenms_plugin/_module_sync_content.html' %}
</div>
